<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-posta Doğrulandı — Dossier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(135deg,#1f3b8b 0%,#2c5fd9 100%);
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    background:#fff;
    color:#0e1116;
    border-radius:16px;
    padding:48px 40px;
    max-width:420px;
    width:calc(100% - 32px);
    box-shadow:0 20px 60px rgba(0,0,0,0.2);
    text-align:center;
  }
  .check{
    width:72px;
    height:72px;
    border-radius:50%;
    background:#1f3b8b;
    color:#fff;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 24px;
    font-size:36px;
  }
  h1{
    font-size:24px;
    font-weight:600;
    margin:0 0 12px;
    letter-spacing:-0.01em;
  }
  p{
    color:#5b6571;
    font-size:15px;
    line-height:1.6;
    margin:0 0 16px;
  }
  .hint{
    margin-top:28px;
    padding-top:24px;
    border-top:1px solid #e6e8eb;
    font-size:13px;
    color:#5b6571;
  }
  .brand{
    font-size:12px;
    font-weight:600;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#1f3b8b;
    margin-bottom:8px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">Dossier</div>
  <div class="check">✓</div>
  <h1>E-postan Doğrulandı</h1>
  <p>Tebrikler, hesabın artık aktif. Şimdi <strong>Dossier</strong> uygulamasına dönüp giriş yapabilirsin.</p>
  <div class="hint">
    Bu sayfayı kapatabilirsin. Uygulamaya dönmek için telefonundaki <strong>Dossier</strong> ikonuna dokun.
  </div>
</div>
</body>
</html>
